<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live Support - Start</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 15px 32px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>Welcome to Live Support</h1>
  <p>Click to start a live video call with support agent.</p>
  
  <div style="margin: 30px 0;">
    <label for="userName">Your Name:</label>
    <input type="text" id="userName" placeholder="Enter your name" value="Guest">
  </div>
  
  <button id="startCall">Start Live Video Call</button>

  <script>
    document.getElementById("startCall").addEventListener("click", () => {
      const userName = document.getElementById("userName").value || "Guest";
      window.location.href = `/call-request?name=${encodeURIComponent(userName)}`;
    });
  </script>
</body>
</html>
