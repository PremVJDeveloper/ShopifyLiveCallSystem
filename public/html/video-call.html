<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Video Call — Vaama Live Support</title>
  <meta name="description" content="Vaama live video call with support agent." />
  <link rel="stylesheet" href="/css/video-call.css" />
</head>
<body>
  <!-- Permission overlay -->
  <div id="permissionOverlay" class="permission-overlay" style="display:none;">
    <div class="permission-box">
      <h2>📷 Camera Access Needed</h2>
      <p id="permissionMessage">Please allow camera and microphone access to join the video call.</p>
      <button id="retryPermission" class="permission-btn primary">Try Again</button>
      <button id="skipPermission" class="permission-btn secondary">Audio Only</button>
    </div>
  </div>

  <!-- Top status bar -->
  <header class="vc-topbar">
    <div class="vc-topbar-left">
      <span class="vc-logo">Vaama Live</span>
      <span id="status" class="status-text connecting">Initializing…</span>
    </div>
    <div class="vc-topbar-right">
      <span id="callDuration" class="call-timer">00:00</span>
      <span id="connectionStatus" class="connection-badge connecting">Connecting…</span>
    </div>
  </header>

  <!-- Main area: video + chat panel -->
  <div class="vc-wrapper">
    <!-- Video grid -->
    <div class="video-grid" id="videoGrid">
      <!-- Remote (customer / agent) -->
      <div class="video-tile remote-tile">
        <div class="remote-overlay" id="remoteOverlay">
          <div class="spinner-sm"></div>
          <p>Waiting for other party…</p>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-label" id="remoteLabel">Remote</div>
      </div>

      <!-- Local (you) -->
      <div class="video-tile local-tile">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label" id="localLabel">You</div>
      </div>
    </div>

    <!-- Chat panel (slides in from right) -->
    <aside id="chatPanel" class="chat-panel" aria-label="Chat panel">
      <div class="chat-header">
        <h3>💬 Chat</h3>
        <button id="closeChat" class="modal-close-btn">✕</button>
      </div>

      <!-- User info strip (admin only — filled by JS) -->
      <div class="user-info-section" id="userInfoStrip" style="display:none;">
        <p><strong>Name:</strong> <span id="chatUserName">—</span></p>
        <p><strong>From:</strong>
          <a id="userReturnUrl" href="#" target="_blank" class="return-url-link">
            <span id="returnUrlText">—</span>
          </a>
        </p>
        <p><strong>ID:</strong> <span id="chatUserId" class="user-id">—</span></p>
      </div>

      <!-- Messages -->
      <div id="chatMessages" class="chat-messages"></div>

      <!-- Input -->
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="Type a message…" rows="1"></textarea>
        <button id="sendMessage" class="send-btn">Send</button>
      </div>

      <!-- Quick responses (admin only, shown by JS) -->
      <div id="quickResponses" class="quick-responses" style="display:none;">
        <p class="quick-responses-title">Quick Replies</p>
        <div class="quick-response-buttons">
          <button class="quick-response-btn" data-message="I'll check that for you.">Checking…</button>
          <button class="quick-response-btn" data-message="Please hold for a moment.">Hold on</button>
          <button class="quick-response-btn" data-message="Can you tell me more?">More info</button>
          <button class="quick-response-btn" data-message="Thank you for your patience!">Thank you</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Controls bar -->
  <div class="controls-bar" role="toolbar" aria-label="Call controls">
    <button id="toggleVideo" class="ctrl-btn" title="Toggle camera" aria-pressed="true">
      <span class="btn-icon">📷</span>
      <span class="btn-label">Camera</span>
    </button>
    <button id="toggleAudio" class="ctrl-btn" title="Toggle microphone" aria-pressed="true">
      <span class="btn-icon">🎙</span>
      <span class="btn-label">Mic</span>
    </button>
    <button id="toggleScreen" class="ctrl-btn" title="Share screen">
      <span class="btn-icon">🖥</span>
      <span class="btn-label">Present</span>
    </button>
    <button id="toggleChat" class="ctrl-btn chat-toggle-btn" title="Open chat" style="position:relative;">
      <span class="btn-icon" id="chatIcon">💬</span>
      <span class="btn-label">Chat</span>
      <span id="unreadBadge" class="unread-badge"></span>
    </button>
    <button id="toggleCatalogBtn" class="ctrl-btn" title="Open Catalog" style="display:none;">
      <span class="btn-icon">📦</span>
      <span class="btn-label">Catalog</span>
    </button>
    <button id="sendAllCatalogBtn" class="ctrl-btn" title="Send All Visible" style="display:none;">
      <span class="btn-icon">📤</span>
      <span class="btn-label">Send All</span>
    </button>
    <button id="endCall" class="ctrl-btn ctrl-btn-end" title="End call">
      <span class="btn-icon">📵</span>
      <span class="btn-label">End Call</span>
    </button>
  </div>

  <!-- Product catalog left-side drawer (admin only) -->
  <div id="catalogPanel" class="catalog-left-drawer" aria-label="Product catalog" style="display:none;">
    <!-- Header -->
    <div class="catalog-header">
      <div class="catalog-header-left">
        <span class="catalog-icon">📦</span>
        <h3>Product Catalog</h3>
        <span id="catalogCount" class="catalog-count"></span>
      </div>
      <button id="toggleCatalog" class="catalog-close-btn" title="Close catalog">✕</button>
    </div>
    <!-- Search + filters -->
    <div class="catalog-filters-bar">
      <input type="text" id="productSearch" placeholder="🔎  Search products…" class="catalog-search-input" />
      <div class="catalog-selects">
        <select id="vendorFilter"><option value="">All Vendors</option></select>
        <select id="typeFilter"><option value="">All Types</option></select>
      </div>
    </div>
    <!-- Product grid (3-col, scrollable) -->
    <div id="catalogContent" class="catalog-content">
      <div id="productsGrid" class="products-grid-left"></div>
    </div>
    <!-- Pagination -->
    <div class="catalog-pagination">
      <button id="prevPage" class="page-btn" disabled>← Prev</button>
      <span id="pageInfo">Page 1 of 1</span>
      <button id="nextPage" class="page-btn" disabled>Next →</button>
    </div>
  </div>

  <!-- Product detail modal -->
  <div id="productModal" class="modal-overlay" style="display:none;"></div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script type="module" src="/js/pages/video-call.js"></script>
</body>
</html>
