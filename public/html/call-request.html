<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waiting for Support — Vaama Live</title>
  <meta name="description" content="Please wait while we connect you to a Vaama support agent." />
  <link rel="stylesheet" href="/css/call-request.css" />
</head>
<body>
  <div class="waiting-container">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">📞</div>
      <h1>Live Support</h1>
      <p>Vaama · Connecting you to an agent</p>
    </div>

    <!-- Animated ring -->
    <div class="connecting-ring" aria-hidden="true">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring-center">💬</div>
    </div>

    <!-- Status -->
    <h2 id="status">Connecting to server…</h2>
    <p id="message">Please wait while we connect you to a support agent.</p>

    <!-- Queue position -->
    <div class="queue-pos-wrap" id="queuePosWrap">
      <span>Your position:</span>
      <span id="queuePosition">#1</span>
    </div>

    <!-- User info card (shown when data available) -->
    <div class="user-info-card" id="userInfoContainer">
      <p><strong>Name:</strong> <span id="displayName"></span></p>
      <p><strong>Phone:</strong> <span id="displayPhone"></span></p>
      <p><strong>From:</strong> <span id="displayReturnUrl"></span></p>
    </div>

    <!-- Cancel -->
    <button class="cancel-btn" id="cancelBtn">
      <span>✕</span> Cancel Request
    </button>

    <p class="wait-info">Average wait time: 1–3 minutes</p>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script type="module" src="/js/pages/call-request.js"></script>
</body>
</html>
