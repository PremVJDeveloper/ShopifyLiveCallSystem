
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Access Restricted - Live Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --navy:         #1e2a4a;
      --navy-mid:     #2d3f6e;
      --navy-light:   #4a5d8a;
      --lavender:     #c8cfe8;
      --bg-start:     #e8eaf6;
      --bg-end:       #cdd3e8;
      --white:        #ffffff;
      --card-bg:      rgba(255, 255, 255, 0.84);
      --input-bg:     #f4f5fb;
      --input-border: #d4d8ee;
      --text-muted:   #8590b0;
      --red:          #e05c5c;
      --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-xl:         28px;
      --r-pill:       100px;
      --shadow-card:  0 16px 56px rgba(30, 42, 74, 0.12), 0 2px 10px rgba(30, 42, 74, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page body — centered lavender gradient ─────────────── */
    body {
      font-family: var(--font);
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--navy);
      position: relative;
      overflow: hidden;
    }

    /* ambient glow blobs */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 207, 232, 0.45) 0%, transparent 65%);
      top: -180px; right: -200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61, 190, 140, 0.07) 0%, transparent 65%);
      bottom: -120px; left: -100px;
      pointer-events: none;
    }

    /* ── Card — frosted glass ────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.90);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-card);
      padding: 40px 38px 36px;
      text-align: center;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.55s ease both;
    }

    /* top shimmer line */
    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 207, 232, 0.9), transparent);
      border-radius: 0 0 2px 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Lock icon ───────────────────────────────────────────── */
    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(224, 92, 92, 0.10), rgba(224, 92, 92, 0.05));
      border: 1px solid rgba(224, 92, 92, 0.18);
      font-size: 34px;
      margin: 0 auto 24px;
      position: relative;
    }

    /* pulsing outer ring */
    .icon::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 26px;
      border: 1.5px solid rgba(224, 92, 92, 0.12);
      animation: shimmerRing 3s ease-in-out infinite;
    }

    @keyframes shimmerRing {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    /* ── Heading ─────────────────────────────────────────────── */
    h1 {
      font-size: 30px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 14px;
      line-height: 1.15;
    }

    /* ── Body paragraphs ─────────────────────────────────────── */
    p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 10px;
    }
    p:last-of-type {
      margin-bottom: 28px;
    }
    p strong {
      color: var(--navy);
      font-weight: 600;
    }
    p a {
      color: var(--navy);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1.5px solid var(--lavender);
      padding-bottom: 1px;
      transition: border-color 0.18s;
    }
    p a:hover {
      border-color: var(--navy);
    }

    /* ── CTA button ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 15px 28px;
      border-radius: var(--r-pill);
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      border: none;
      color: #ffffff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(30, 42, 74, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.10);
      transition: transform 0.14s, box-shadow 0.18s;
      margin-top: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(30, 42, 74, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      opacity: 1;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .container { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔒</div>
    <h1>Access Restricted</h1>
    <p>This live support service is exclusively available to <strong>vaama.co</strong> customers.</p>
    <p>Please visit <a href="https://vaama.co" target="_blank">vaama.co</a> to access the live video call support.</p>
    <a href="https://vaama.co" class="btn">Go to vaama.co</a>
  </div>
</body>
</html>
