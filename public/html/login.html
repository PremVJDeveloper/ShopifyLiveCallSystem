<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Live Support</title>
  <meta name="description" content="Admin login for Vaama Live Support system" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --navy:         #1e2a4a;
      --navy-mid:     #2d3f6e;
      --navy-light:   #4a5d8a;
      --lavender:     #c8cfe8;
      --bg-start:     #e8eaf6;
      --bg-end:       #cdd3e8;
      --white:        #ffffff;
      --card-bg:      rgba(255, 255, 255, 0.84);
      --input-bg:     #f4f5fb;
      --input-border: #d4d8ee;
      --text-muted:   #8590b0;
      --green:        #3dbe8c;
      --red:          #e05c5c;
      --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-sm:         10px;
      --r-md:         14px;
      --r-lg:         22px;
      --r-xl:         28px;
      --r-pill:       100px;
      --shadow-card:  0 16px 56px rgba(30, 42, 74, 0.12), 0 2px 10px rgba(30, 42, 74, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page body — centered lavender gradient ─────────────── */
    body {
      font-family: var(--font);
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--navy);
      position: relative;
      overflow: hidden;
    }

    /* ambient glow blobs */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 207, 232, 0.45) 0%, transparent 65%);
      top: -180px; right: -200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61, 190, 140, 0.07) 0%, transparent 65%);
      bottom: -120px; left: -100px;
      pointer-events: none;
    }

    /* ── Login card — frosted glass ─────────────────────────── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.90);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-card);
      padding: 40px 38px 36px;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.55s ease both;
    }

    /* top shimmer line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 207, 232, 0.9), transparent);
      border-radius: 0 0 2px 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo section ───────────────────────────────────────── */
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    /* icon container */
    .login-logo .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      box-shadow: 0 6px 20px rgba(30, 42, 74, 0.22);
      font-size: 26px;
      margin-bottom: 16px;
    }

    .login-logo h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.15;
      margin-bottom: 4px;
      /* remove old gradient clip */
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: var(--navy);
    }

    .login-logo p {
      font-size: 12.5px;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 0;
      letter-spacing: 0.02em;
    }

    /* ── Form group ─────────────────────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy-light);
      margin-bottom: 7px;
    }

    /* ── Inputs ─────────────────────────────────────────────── */
    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: var(--r-md);
      color: var(--navy);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--navy-light);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(74, 93, 138, 0.10);
    }

    /* ── Error message ──────────────────────────────────────── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      background: rgba(224, 92, 92, 0.07);
      border: 1px solid rgba(224, 92, 92, 0.22);
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-size: 12.5px;
      color: var(--red);
      font-weight: 500;
      margin-bottom: 16px;
      animation: fadeUp 0.25s ease;
    }
    /* JS sets display:block — keep it looking right */
    .error-msg[style*="block"] { display: flex !important; }

    /* ── Submit button ───────────────────────────────────────── */
    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 14px 28px;
      border-radius: var(--r-pill);
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      border: none;
      color: #ffffff;
      font-family: var(--font);
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 20px rgba(30, 42, 74, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.10);
      transition: transform 0.14s, box-shadow 0.18s;
      margin-top: 8px;
      margin-bottom: 0;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(30, 42, 74, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    /* ── Dev hint ───────────────────────────────────────────── */
    .dev-hint {
      margin-top: 20px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.65;
    }
    .dev-hint strong {
      color: var(--navy-light);
      font-weight: 700;
    }
    .dev-hint code {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 11px;
      background: rgba(30, 42, 74, 0.07);
      border: 1px solid rgba(30, 42, 74, 0.10);
      color: var(--navy);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🛡️</div>
      <h1>Admin Login</h1>
      <p>Vaama Live Support System</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="submit-btn" id="submitBtn">Sign In →</button>
    </form>

    <div class="dev-hint">
      <strong>First time?</strong> In development mode, use username <code>admin</code> and password <code>admin</code>.
      Set <code>ADMIN_PASSWORD_HASH</code> in your <code>.env</code> for production.
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
